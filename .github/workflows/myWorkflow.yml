# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Grant write permissions to the token
permissions:
  contents: write
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository first so the workflow can see your pom.xml
      - name: Checkout Code
        uses: actions/checkout@v6

      # Set up Java AND handle Maven caching natively in one single place
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          
      # Manually handle Maven caching and give this step an 'id'
      - name: Cache Maven Packages
        id: maven-cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml', '**/src/site/site.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      # Pre-fetch ALL dependencies and plugins
      - name: Resolve all dependencies
        if: steps.maven-cache.outputs.cache-hit != 'true'
        run: |
          mvn -B de.qaware.maven:go-offline-maven-plugin:resolve-dependencies --file pom.xml
          mvn -B dependency:get -Dartifact=com.google.googlejavaformat:google-java-format:1.8 --file pom.xml
          mvn -B site:help --file pom.xml
          mvn -B dependency:get -Dartifact=org.apache.maven.plugins:maven-project-info-reports-plugin:3.9.0 --file pom.xml
          mvn -B dependency:get -Dartifact=org.apache.maven.plugins:maven-antrun-plugin:3.1.0 --file pom.xml
          mvn -B dependency:get -Dartifact=org.apache.maven.plugins:maven-assembly-plugin:3.7.1 --file pom.xml
          mvn -B dependency:get -Dartifact=org.apache.maven.plugins:maven-release-plugin:3.0.1 --file pom.xml
          
          # Fetch BOTH the JAR and the POM descriptor for the exact version the project uses
          mvn -B dependency:get -Dartifact=org.apache.maven.skins:maven-fluido-skin:2.0.0-M9 --file pom.xml
          mvn -B dependency:get -Dartifact=org.apache.maven.skins:maven-fluido-skin:2.0.0-M9:pom --file pom.xml

      # Build the project using the shared cache
      - name: Build with Maven
        run: mvn -B -o package --file pom.xml

      # Create project site using the same shared cache
      - name: Create project site
        run: mvn -B -o site

      # Publish project site to GH Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site        
