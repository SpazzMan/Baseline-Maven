# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Grant write permissions to the token
permissions:
  contents: write
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # 1. Checks-out your repository first so the workflow can see your pom.xml
      - name: Checkout Code
        uses: actions/checkout@v6

      # 2. Set up Java AND handle Maven caching natively in one single place
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven' # This automatically caches ~/.m2/repository for all subsequent steps
      
      # 3. Pre-fetch ALL dependencies and plugins
      - name: Resolve all dependencies
        run: |
          mvn -B de.qaware.maven:go-offline-maven-plugin:resolve-dependencies --file pom.xml
          mvn -B site:help --file pom.xml

      # 4. Build the project using the shared cache
      - name: Build with Maven
        run: mvn -B -o package --file pom.xml

      # 5. Create project site using the same shared cache
      - name: Create project site
        run: mvn -B -o site

      # 6. Publish project site to GH Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site        
